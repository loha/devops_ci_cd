apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.application.name }}
  namespace: {{ .Values.application.namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.application.project }}
  source:
    repoURL: {{ .Values.repository.url | quote }}
    targetRevision: {{ .Values.application.targetRevision | quote }}
    path: {{ .Values.application.path | quote }}
    helm:
      {{- if .Values.application.imageRepository }}
      parameters:
        - name: image.repository
          value: {{ .Values.application.imageRepository | quote }}
      {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.application.destinationNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
