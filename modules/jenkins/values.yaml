controller:
  admin:
    username: ${admin_user}

  # Extra plugins required for the CI/CD pipeline.
  installPlugins:
    - kubernetes:4290.v93ea_4b_c3f8_71
    - workflow-aggregator:600.vb_57cdd26fdd7
    - git:5.4.1
    - configuration-as-code:1836.vccda_4a_122a_a_e
    - pipeline-stage-view:2.34
    - credentials-binding:681.vf91669a_32e45
    - aws-credentials:231.v08a_59f17d742

  serviceType: ${service_type}

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # Jenkins Configuration as Code — declares the Kubernetes cloud + agent pod
  # template with Kaniko (image build/push) and Git containers.
  JCasC:
    defaultConfig: true
    configScripts:
      kaniko-agent: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                containerCapStr: "10"
                templates:
                  - name: "kaniko-git"
                    label: "kaniko-git"
                    serviceAccount: "jenkins"
                    yaml: |
                      apiVersion: v1
                      kind: Pod
                      spec:
                        containers:
                          - name: kaniko
                            image: gcr.io/kaniko-project/executor:v1.23.2-debug
                            imagePullPolicy: IfNotPresent
                            command:
                              - /busybox/cat
                            tty: true
                            resources:
                              requests:
                                cpu: "500m"
                                memory: "1Gi"
                          - name: git
                            image: alpine/git:2.45.2
                            imagePullPolicy: IfNotPresent
                            command:
                              - /bin/sh
                              - -c
                              - cat
                            tty: true
                        restartPolicy: Never

  # Environment variables surfaced to jobs (used inside the Jenkinsfile).
  containerEnv:
    - name: AWS_REGION
      value: "${aws_region}"
    - name: ECR_REGISTRY
      value: "${ecr_registry}"

agent:
  enabled: true

persistence:
  enabled: true
  storageClass: ${storage_class}
  size: ${storage_size}

# ServiceAccount used by Jenkins controller + agents. Annotate it with an IRSA
# role ARN in production so Kaniko can push to ECR without static credentials.
serviceAccount:
  create: true
  name: jenkins

serviceAccountAgent:
  create: false
