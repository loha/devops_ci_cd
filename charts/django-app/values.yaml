image:
  repository: ""  # ECR repository URL, e.g. <account_id>.dkr.ecr.us-west-2.amazonaws.com/lesson-7-ecr
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

config:
  DJANGO_SECRET_KEY: "change-me"
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*"
  POSTGRES_DB: "app_db"
  POSTGRES_USER: "app_user"
  POSTGRES_PASSWORD: "app_password"
  POSTGRES_HOST: "db"
  POSTGRES_PORT: "5432"

ingress:
  enabled: false
  className: nginx
  host: yourdomain.com
  path: /
  pathType: Prefix
  tls: true
  clusterIssuer: letsencrypt-prod
